name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Install homebrew-pypi-poet
        run: |
          uv venv --python 3.14 poet-venv
          for i in $(seq 1 20); do
            if uv pip install --python poet-venv homebrew-pypi-poet czk-tool==${{ env.VERSION }}; then
              exit 0
            fi
            echo "Attempt $i: czk-tool ${{ env.VERSION }} not yet available, retrying in 30s..."
            sleep 30
          done
          echo "Timed out waiting for czk-tool ${{ env.VERSION }} on PyPI"
          exit 1

      - name: Generate Homebrew formula
        run: |
          poet-venv/bin/poet -f czk-tool > czk.rb
          sed -i '/depends_on "python@/a\  depends_on "czkawka"\n  depends_on "duckdb"' czk.rb

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: manojkarthick/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula in tap
        run: cp czk.rb homebrew-tap/Formula/czk.rb

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/czk.rb
          git commit -m "chore: update czk formula to ${{ env.VERSION }}"
          git push

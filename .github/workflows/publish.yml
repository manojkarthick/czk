name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Install homebrew-pypi-poet
        run: |
          uv venv --python 3.14 poet-venv
          for i in $(seq 1 20); do
            if uv pip install --python poet-venv setuptools homebrew-pypi-poet czk-tool==${{ env.VERSION }}; then
              exit 0
            fi
            echo "Attempt $i: czk-tool ${{ env.VERSION }} not yet available, retrying in 30s..."
            sleep 30
          done
          echo "Timed out waiting for czk-tool ${{ env.VERSION }} on PyPI"
          exit 1

      - name: Generate Homebrew formula
        run: |
          PYPI_JSON=$(curl -s https://pypi.org/pypi/czk-tool/${{ env.VERSION }}/json)
          SDIST_URL=$(echo "$PYPI_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(next(f['url'] for f in d['urls'] if f['packagetype']=='sdist'))")
          SDIST_SHA256=$(echo "$PYPI_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(next(f['digests']['sha256'] for f in d['urls'] if f['packagetype']=='sdist'))")
          RESOURCES=$(poet-venv/bin/poet czk-tool)
          VERSION="${{ env.VERSION }}" SDIST_URL="$SDIST_URL" SDIST_SHA256="$SDIST_SHA256" RESOURCES="$RESOURCES" python3 << 'PYEOF'
          import os
          version = os.environ["VERSION"]
          url = os.environ["SDIST_URL"]
          sha256 = os.environ["SDIST_SHA256"]
          resources = os.environ["RESOURCES"].strip()
          lines = [
              "class Czk < Formula",
              "  include Language::Python::Virtualenv",
              "",
              '  desc "CLI wrapper around czkawka_cli for duplicate media workflows"',
              '  homepage "https://github.com/manojkarthick/czk"',
              f'  url "{url}"',
              f'  sha256 "{sha256}"',
              f'  version "{version}"',
              '  license "MIT"',
              "",
              '  depends_on "python@3.14"',
              '  depends_on "czkawka"',
              '  depends_on "duckdb"',
              "",
              resources,
              "",
              "  def install",
              "    virtualenv_install_with_resources",
              "  end",
              "",
              "  test do",
              f'    assert_match "{version}", shell_output("' + "#{bin}" + '/czk --version")',
              "  end",
              "end",
              "",
          ]
          with open("czk.rb", "w") as f:
              f.write("\n".join(lines))
          PYEOF

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: manojkarthick/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula in tap
        run: cp czk.rb homebrew-tap/Formula/czk.rb

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/czk.rb
          git commit -m "chore: update czk formula to ${{ env.VERSION }}"
          git push

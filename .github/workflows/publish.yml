name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Check if version exists on PyPI
        run: |
          if curl -fsS -o /dev/null "https://pypi.org/pypi/czk-tool/${{ env.VERSION }}/json"; then
            echo "PYPI_VERSION_EXISTS=true" >> $GITHUB_ENV
            echo "czk-tool ${{ env.VERSION }} already exists on PyPI; skipping publish."
          else
            echo "PYPI_VERSION_EXISTS=false" >> $GITHUB_ENV
            echo "czk-tool ${{ env.VERSION }} not found on PyPI; publishing."
          fi

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        if: env.PYPI_VERSION_EXISTS != 'true'
        run: uv publish

      - name: Install homebrew-pypi-poet
        run: |
          uv venv --python 3.14 poet-venv
          # homebrew-pypi-poet still imports pkg_resources, which was removed
          # in setuptools 82+.
          uv pip install --python poet-venv 'setuptools<82' homebrew-pypi-poet "dist/czk_tool-${{ env.VERSION }}-py3-none-any.whl"

      - name: Generate Homebrew formula
        run: |
          PYPI_JSON=""
          for i in $(seq 1 20); do
            PYPI_JSON=$(curl -fsS https://pypi.org/pypi/czk-tool/${{ env.VERSION }}/json) && break
            echo "Attempt $i: PyPI metadata for czk-tool ${{ env.VERSION }} not yet available, retrying in 15s..."
            sleep 15
          done
          if [ -z "$PYPI_JSON" ]; then
            echo "Timed out waiting for PyPI metadata for czk-tool ${{ env.VERSION }}"
            exit 1
          fi
          SDIST_URL=$(printf '%s' "$PYPI_JSON" | jq -r '.urls[] | select(.packagetype == "sdist") | .url')
          SDIST_SHA256=$(printf '%s' "$PYPI_JSON" | jq -r '.urls[] | select(.packagetype == "sdist") | .digests.sha256')
          RESOURCES=$(poet-venv/bin/poet czk-tool)
          VERSION="${{ env.VERSION }}" SDIST_URL="$SDIST_URL" SDIST_SHA256="$SDIST_SHA256" RESOURCES="$RESOURCES" python3 << 'PYEOF'
          import os
          from pathlib import Path

          formula = (
              Path(".github/templates/czk.rb.tmpl")
              .read_text()
              .replace("{{VERSION}}", os.environ["VERSION"])
              .replace("{{SDIST_URL}}", os.environ["SDIST_URL"])
              .replace("{{SDIST_SHA256}}", os.environ["SDIST_SHA256"])
              .replace("{{RESOURCES}}", os.environ["RESOURCES"].rstrip())
          )
          Path("czk.rb").write_text(formula)
          PYEOF

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: manojkarthick/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula in tap
        run: cp czk.rb homebrew-tap/Formula/czk.rb

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/czk.rb
          git commit -m "chore: update czk formula to ${{ env.VERSION }}"
          git push
